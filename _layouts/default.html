<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">

{% include head.html %}

<body>
  <div class="container content">
    <header class="masthead">
      <div class="masthead-inner">
        <h3 class="masthead-title">
          <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
          <small>{{ site.tagline }}</small>
        </h3>
        {% include navi.html %}
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="footer">
      <small>
        &copy; <time datetime="{{ site.time | date_to_xmlschema }}">{{ site.time | date: '%Y' }}</time>. All rights
        reserved.
      </small>
    </footer>
  </div>
</body>

</html>
