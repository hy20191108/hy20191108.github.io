<head>
  <!-- Google tag (gtag.js) -->
  {% if site.ga_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.ga_analytics }}');
  </script>
  {% endif %}
  <!-- End Google tag -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% if page.url contains '/en/' %}
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" hreflang="ja" href="{{ site.url }}/">
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}/">
  {% else %}
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" hreflang="ja" href="{{ site.url }}/">
  <link rel="alternate" hreflang="en" href="{{ site.url }}/en/">
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}/">
  {% endif %}

  <title>
    {% if page.title == "Home" %}
    {{ site.title }}{% if site.tagline %} &middot; {{ site.tagline }}{% endif %}
    {% else %}
    {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <link rel="stylesheet" href="{{ 'styles.css' | relative_url }}">
  <link rel="apple-touch-icon-precomposed" sizes="144x144"
    href="{{ '/assets/apple-touch-icon-precomposed.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ 'atom.xml' | relative_url }}">

  <!-- Structured Data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Haruhiko Yoshioka",
    "givenName": "Haruhiko",
    "familyName": "Yoshioka",
    "alternateName": "吉岡春彦",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://github.com/hy20191108",
      "https://x.com/zero12345six",
      "https://www.linkedin.com/in/haruhiko-yoshioka-6aa921358/"
    ],
    "affiliation": {
      "@type": "Organization",
      "name": "Nara Institute of Science and Technology",
      "alternateName": "奈良先端科学技術大学院大学"
    },
    "knowsAbout": [
      "Software Engineering",
      "Program Comprehension",
      "Eye Tracking",
      "Machine Learning",
      "Deep Learning",
      "Natural Language Processing"
    ],
    "inLanguage": [
      {
        "@type": "Language",
        "name": "Japanese",
        "alternateName": "ja"
      },
      {
        "@type": "Language",
        "name": "English",
        "alternateName": "en"
      }
    ]
  }
  </script>

  {% seo title=false canonical=false %}
</head>
